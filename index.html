<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节日祝福</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <canvas id="fireworks"></canvas>
        <div class="light-spots" id="lightSpots"></div>
        <div class="confetti-container" id="confettiContainer"></div>
        <div class="greeting">
            <h1 class="title">节日快乐</h1>
            <p class="message">愿你的生活充满阳光</p>
            <p class="message">幸福永远相伴</p>
        </div>
        <div class="floating-texts" id="floatingTexts"></div>

        <button id="musicToggle" class="music-toggle">🔊</button>
    </div>
    <audio id="bgMusic" loop autoplay preload="auto">
        <source src="https://music.163.com/song/media/outer/url?id=1986132063.mp3" type="audio/mpeg">
    </audio>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
