<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重定向</title>
    <script>
        // GitHub Pages 单页应用重定向
        if (window.location.pathname !== '/') {
            window.location.href = window.location.origin + '/#/' + window.location.pathname;
        }
    </script>
</head>
<body>
    <p>正在跳转...</p>
</body>
</html>
